          - heading "Why floats, not integers?" [level=4] [ref=e747]: Why floats, not integers?
          - paragraph [ref=e749]:
            - text: Token IDs are integers (like
            - code [ref=e750]: "1234"
            - text: ), but the model can't do math with them directly —
            - code [ref=e751]: 1234 + 1 = 1235
            - text: is meaningless. Embeddings convert each ID into a dense float vector the network can do linear algebra on.
        - generic [ref=e752]:
          - heading "What do dimensions encode?" [level=4] [ref=e753]: What do dimensions encode?
          - paragraph [ref=e755]: "Dimensions are not hand-labelled features. They emerge from training. Roughly: some encode syntax (noun vs verb), others encode sentiment, domain (finance vs medicine), tense, formality. No single dimension = one concept."
        - generic [ref=e756]:
          - heading "Same word, different context?" [level=4] [ref=e757]: Same word, different context?
          - paragraph [ref=e759]: These are static embeddings (one vector per token regardless of context). Transformer attention layers then blend them based on surrounding tokens — so "bank" (river) vs "bank" (finance) get different final representations.
        - generic [ref=e760]:
          - heading "Similarity = shared dimensions" [level=4] [ref=e761]: Similarity = shared dimensions
          - paragraph [ref=e763]: When two words share high values in similar dimensions, cosine similarity is high. The Compare tab shows this dimension-by-dimension — look for bars that move together.